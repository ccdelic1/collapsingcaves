modLoader="javafml"
loaderVersion="${loader_version_range}"
license="CC0-1.0"

[[mods]]
modId="collapsingcaves"
version="${mod_version}"
displayName="CollapsingCaves"
authors="ccdelic"
logoFile="assets/collapsingcaves/icon.png"

description='''Adds realistic cave-in mechanics to Minecraft. Stone, ores, and dirt-like blocks can collapse when mined, creating dramatic progressive cave-ins with screen shake effects.'''

[[dependencies.collapsingcaves]]
    modId="forge"
    mandatory=true
    versionRange="${forge_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.collapsingcaves]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"
